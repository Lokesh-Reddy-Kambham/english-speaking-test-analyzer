services:
  - type: web
    name: speak-meter-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: speak-meter-db
          property: connectionString
      - key: UPLOAD_DIR
        value: uploads
      - key: WHISPER_MODEL
        value: base
      - key: LANGUAGETOOL_LANGUAGE
        value: en-US
      - key: BACKEND_CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173,https://frontend-seven-gules-39.vercel.app

databases:
  - name: speak-meter-db
    plan: free
